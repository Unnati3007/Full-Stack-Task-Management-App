version: "3.9"

# This compose file runs the database + API locally with one command.
# Run the React frontend separately with: cd client && npm install && npm run dev
# (Vite's dev server needs to run on your host machine for hot-reload to work well;
#  for production, the frontend is deployed to Vercel instead — see the deploy guide.)

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpass}
      POSTGRES_DB: ${POSTGRES_DB:-taskdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskuser}:${POSTGRES_PASSWORD:-taskpass}@db:5432/${POSTGRES_DB:-taskdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"

volumes:
  pgdata:
